<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#D4537E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Aniversariantes">
  <meta name="description" content="Gerenciador de aniversariantes">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <title>🎂 Aniversariantes</title>
</head>
<body>

<div class="app" id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div>
        <h1>🎂 Aniversariantes</h1>
        <p id="header-date"></p>
      </div>
      <button class="icon-btn" onclick="openImport()" title="Importar/Exportar">⋮</button>
    </div>
    <div class="header-tabs">
      <button class="tab active" data-view="todos" onclick="setView(this,'todos')">Todos</button>
      <button class="tab" data-view="este-mes" onclick="setView(this,'este-mes')">Este mês</button>
      <button class="tab" data-view="proximos" onclick="setView(this,'proximos')">Próximos 30d</button>
      <button class="tab" data-view="sem-data" onclick="setView(this,'sem-data')">Sem data</button>
    </div>
  </div>

  <!-- TODAY BANNER -->
  <div id="today-section"></div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-month">0</div>
      <div class="stat-label">Este mês</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-today">0</div>
      <div class="stat-label">Hoje</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-nodate">0</div>
      <div class="stat-label">Sem data</div>
    </div>
  </div>

  <!-- NOTIFICATION TOGGLE -->
  <div class="notif-bar" id="notif-bar">
    <span id="notif-text">🔔 Ativar avisos de aniversário</span>
    <button class="toggle-btn" id="notif-toggle" onclick="toggleNotif()">
      <span class="toggle-knob"></span>
    </button>
  </div>

  <!-- SEARCH + FILTER -->
  <div class="search-wrap">
    <input type="text" id="search" placeholder="🔍  Buscar pessoa..." oninput="render()">
  </div>
  <div class="month-filters" id="month-filters"></div>

  <!-- LIST -->
  <div class="list" id="list"></div>

</div>

<!-- FAB ADD BUTTON -->
<button class="fab" onclick="openModal(null)" title="Adicionar">+</button>

<!-- MODAL -->
<div class="backdrop hidden" id="backdrop" onclick="handleBackdropClick(event)">
  <div class="sheet" id="modal-sheet">
    <div class="sheet-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<!-- IMPORT/EXPORT MENU -->
<div class="backdrop hidden" id="menu-backdrop" onclick="closeMenu()">
  <div class="bottom-menu" id="bottom-menu" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <h3 style="margin-bottom:16px">Opções</h3>
    <button class="menu-item" onclick="exportCSV()">📤 Exportar como CSV</button>
    <button class="menu-item" onclick="exportJSON()">💾 Exportar como JSON</button>
    <button class="menu-item" onclick="document.getElementById('import-file').click()">📥 Importar CSV</button>
    <button class="menu-item danger" onclick="clearAll()">🗑️ Apagar todos os dados</button>
    <input type="file" id="import-file" accept=".csv,.json" style="display:none" onchange="importFile(event)">
    <button class="menu-item" onclick="closeMenu()" style="margin-top:8px;color:#888">Cancelar</button>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
</script>
</body>
</html>
